# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  swift:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: MotionEngineKit

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: swift build -v
    - name: Run tests
      run: swift test -v

  studio:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Enable Corepack
      run: corepack enable
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "pnpm"
        cache-dependency-path: FrameZeroStudio/pnpm-lock.yaml
    - name: Install Studio dependencies
      run: pnpm --dir FrameZeroStudio install --frozen-lockfile
    - name: Install visual test dependencies
      run: |
        python3 -m pip install -r FrameZeroStudio/apps/studio-web/scripts/requirements-visual.txt
        python3 -m playwright install chromium
    - name: Run Studio tests
      run: pnpm --dir FrameZeroStudio test
    - name: Build Studio
      run: pnpm --dir FrameZeroStudio build
